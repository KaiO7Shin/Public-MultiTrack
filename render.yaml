# Blueprint Render — Static Site Public-MultiTrack
# https://dashboard.render.com → New → Blueprint
services:
  - type: web
    name: public-multitrack
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://b-mtrack-service.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
